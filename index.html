<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Professional Registration Form</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="bg-animation">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <div class="container">

        <div class="logo">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>Create Account</h1>

        <form id="registerForm">

            <div class="profile-upload">

                <label for="profileImage">

                    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
                    id="preview"
                    alt="Profile">

                </label>

                <input
                type="file"
                id="profileImage"
                accept="image/*">

            </div>

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                type="text"
                id="fullname"
                required>

                <label>Full Name</label>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-id-card"></i>

                <input
                type="text"
                id="username"
                required>

                <label>Username</label>

                <small id="userMessage"></small>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                type="email"
                id="email"
                required>

                <label>Email</label>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input
                type="tel"
                id="phone"
                maxlength="10"
                pattern="[0-9]{10}"
                required>

                <label>Phone Number</label>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-earth-asia"></i>

                <select required>

                     <option value="">Select Course</option>

        <option>BCA</option>
        <option>BBA</option>
        <option>B.Com</option>
        <option>B.Sc</option>
        <option>B.Tech</option>
        <option>BA</option>
        <option>B.Ed</option>
        <option>B.Pharm</option>
        <option>LLB</option>
        <option>MBBS</option>
        <option>BDS</option>
        <option>Diploma</option>
        <option>MCA</option>
        <option>MBA</option>
        <option>M.Com</option>
        <option>M.Sc</option>
        <option>M.Tech</option>
        <option>Ph.D</option>
        <option>Other</option>

                </select>

            </div>

            <div class="gender">

                <label>

                    <input
                    type="radio"
                    name="gender"
                    value="Male"
                    required>

                    Male

                </label>

                <label>

                    <input
                    type="radio"
                    name="gender"
                    value="Female">

                    Female

                </label>

                <label>

                    <input
                    type="radio"
                    name="gender"
                    value="Other">

                    Other

                </label>

            </div>

            <div class="input-box password-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                minlength="8"
                required>

                <label>Password</label>

                <span id="togglePassword">

                    <i class="fa-solid fa-eye"></i>

                </span>

            </div>

            <div class="strength">

                <div id="strengthBar"></div>

            </div>

            <div class="terms">

                <input
                type="checkbox"
                id="terms"
                required>

                <label for="terms">

                    I agree to the Terms & Conditions

                </label>

            </div>

            <button
            type="submit"
            id="registerBtn">

                Register

            </button>

        </form>

        <div
        class="loader"
        id="loader">

            <div class="spinner"></div>

            Registering...

        </div>

        <div
        class="success-popup"
        id="successPopup">

            <i class="fa-solid fa-circle-check"></i>

            <h2>Registration Successful!</h2>

            <p>Your account has been created successfully.</p>

        </div>

        <div class="footer">

            Already have an account?

            <a href="#">Login</a>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
