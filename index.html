<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Professional Registration Form</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Background Animation -->
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Main Container -->
    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>Registration Form</h1>

        <!-- Registration Form -->
        <form id="registerForm" class="register-form">

            <!-- Profile Upload -->
            <div class="profile-upload">

                <label for="profileImage">

                    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
                        id="preview"
                        alt="Profile">

                </label>

                <input
                    type="file"
                    id="profileImage"
                    accept="image/*"
                    hidden>

            </div>

            <!-- Full Name -->
            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="fullname"
                    autocomplete="name"
                    required>

                <label>Full Name</label>

            </div>

            <!-- Username -->
            <div class="input-box">

                <i class="fa-solid fa-id-card"></i>

                <input
                    type="text"
                    id="username"
                    autocomplete="username"
                    required>

                <label>Username</label>

                <small id="userMessage"></small>

            </div>

            <!-- Email -->
            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    autocomplete="email"
                    required>

                <label>Email</label>

            </div>

            <!-- Phone -->
            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input
                    type="tel"
                    id="phone"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    autocomplete="tel"
                    required>

                <label>Phone Number</label>

            </div>

            <!-- Course -->
            <div class="input-box">

                <i class="fa-solid fa-graduation-cap"></i>

                <select id="course" required>

                    <option value="">Select Course</option>

                    <option>BCA</option>
                    <option>BBA</option>
                    <option>B.Com</option>
                    <option>B.Sc</option>
                    <option>B.Tech</option>
                    <option>BA</option>
                    <option>B.Ed</option>
                    <option>B.Pharm</option>
                    <option>LLB</option>
                    <option>MBBS</option>
                    <option>BDS</option>
                    <option>Diploma</option>
                    <option>MCA</option>
                    <option>MBA</option>
                    <option>M.Com</option>
                    <option>M.Sc</option>
                    <option>M.Tech</option>
                    <option>Ph.D</option>
                    <option>Other</option>

                </select>

            </div>

            <!-- Gender -->
            <div class="gender-group">

                <span class="gender-title">Gender</span>

                <div class="gender">

                    <label class="gender-option">
                        <input
                            type="radio"
                            name="gender"
                            value="Male"
                            required>
                        <span>Male</span>
                    </label>

                    <label class="gender-option">
                        <input
                            type="radio"
                            name="gender"
                            value="Female">
                        <span>Female</span>
                    </label>

                    <label class="gender-option">
                        <input
                            type="radio"
                            name="gender"
                            value="Other">
                        <span>Other</span>
                    </label>

                </div>

            </div>

            <!-- Password -->
            <div class="input-box password-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    autocomplete="new-password"
                    minlength="8"
                    required>

                <label>Password</label>

                <span id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                </span>

            </div>

            <!-- Password Strength -->
            <div class="strength">
                <div id="strengthBar"></div>
            </div>

            <!-- Terms -->

            </div>

            <!-- Button -->
            <button
                type="submit"
                id="registerBtn">

                Register

            </button>

        </form>

        <!-- Loader -->
        <div
            class="loader"
            id="loader">

            <div class="spinner"></div>

            Registering...

        </div>

        <!-- Success Popup -->
        <div
            class="success-popup"
            id="successPopup">

            <i class="fa-solid fa-circle-check"></i>

            <h2>Registration Successful!</h2>

            <p>Your account has been created successfully.</p>

        </div>

        <!-- Footer -->
        <div class="footer">

            Already have an account?

            <a href="#">Login</a>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
